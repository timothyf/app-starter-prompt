<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Starter Prompt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <h1>App Starter Prompt</h1>
        <p class="intro">
          Choose a backend stack and optional frontend to generate a reusable prompt for AI app builders.
        </p>

        <form id="stack-form" class="stack-form">
          <section class="stack-section app-description-section">
            <h2>App Description</h2>

            <label for="app-description">Description</label>
            <textarea
              id="app-description"
              name="app-description"
              rows="3"
              placeholder="Optional: describe what the app should do"
            ></textarea>
          </section>

          <div class="stack-sections">
            <section class="stack-section">
              <h2>Backend</h2>

              <label class="top-label" for="backend-language">Language</label>
              <select id="backend-language" name="backend-language">
                <option value="">Select a backend language</option>
              </select>

              <div id="backend-language-version-group" hidden>
                <label class="top-label" for="backend-language-version" id="backend-language-version-label">Language Version</label>
                <select id="backend-language-version" name="backend-language-version" disabled>
                  <option value="">Select a version</option>
                </select>
              </div>

              <label class="top-label" for="backend-framework">Framework</label>
              <select id="backend-framework" name="backend-framework" disabled>
                <option value="">Select a backend framework</option>
              </select>

              <div id="backend-version-group" hidden>
                <label class="top-label" for="backend-version" id="backend-version-label">Framework Version</label>
                <select id="backend-version" name="backend-version" disabled>
                  <option value="">Select a version</option>
                </select>
              </div>

              <label class="top-label" for="database">Database</label>
              <select id="database" name="database">
                <option value="">No database selected</option>
              </select>

              <div id="database-version-group" hidden>
                <label class="top-label" for="database-version" id="database-version-label">Database Version</label>
                <select id="database-version" name="database-version" disabled>
                  <option value="">Select a version</option>
                </select>
              </div>

              <fieldset>
                <legend>Add-ons</legend>
                <div id="backend-addons" class="option-list"></div>
              </fieldset>
            </section>

            <section class="stack-section">
              <h2>Frontend</h2>

              <label for="frontend-framework">Framework</label>
              <select id="frontend-framework" name="frontend-framework">
                <option value="">No frontend / backend only</option>
              </select>

              <fieldset>
                <legend>Add-ons</legend>
                <div id="frontend-addons" class="option-list"></div>
              </fieldset>
            </section>
          </div>

          <button type="submit" class="primary-action">Generate Prompt</button>
        </form>
      </section>

      <section class="panel output-panel">
        <div class="output-header">
          <h2>Generated Prompt</h2>
          <button id="copy-button" type="button" disabled>Copy Prompt</button>
        </div>
        <pre id="prompt-output" class="prompt-output">Select your stack and generate a prompt.</pre>
        <p id="copy-status" class="copy-status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
